<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7Z</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, rgba(0,0,0,0) 70%);
            background-size: 100% 100%;
            animation: moveGradient 12s linear infinite;
            z-index: 1;
        }

        @keyframes moveGradient {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 550px;
            padding: 2px;
            background: linear-gradient(90deg, #d4af37, #856404, #f3e5ab, #d4af37);
            background-size: 300% 300%;
            animation: borderGlow 5s ease infinite;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .main-box {
            background-color: #121212;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .header-icon {
            font-size: 3rem;
            color: #d4af37;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        h1 {
            font-size: 1.8rem;
            color: #d4af37;
            margin-bottom: 30px;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .drop-zone {
            border: 2px dashed #d4af37;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(212, 175, 55, 0.02);
        }

        .drop-zone:hover {
            background: rgba(212, 175, 55, 0.05);
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .drop-zone input {
            display: none;
        }

        .upload-icon {
            font-size: 2.5rem;
            color: #d4af37;
            margin-bottom: 15px;
        }

        .drop-zone p {
            color: #a0a0a0;
            font-size: 1rem;
        }

        .file-info {
            margin-top: 25px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #f3e5ab;
            font-size: 0.95rem;
            background: rgba(212, 175, 55, 0.05);
            padding: 12px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .download-btn {
            display: none;
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            background: linear-gradient(45deg, #856404, #d4af37);
            color: #000000;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .download-btn:hover {
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
            background: linear-gradient(45deg, #d4af37, #f3e5ab);
        }

        .download-btn i {
            margin-left: 8px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="main-box">
            <div class="header-icon"><i class="fa-solid fa-crown"></i></div>
            <h1>تحويل الملف HTML</h1>

            <div class="drop-zone" id="dropZone">
                <div class="upload-icon"><i class="fa-solid fa-file-import"></i></div>
                <p>اسحب وأفلت الملف هنا أو اضغط للاختيار</p>
                <input type="file" id="fileInput">
            </div>

            <div class="file-info" id="fileInfo">
                <i class="fa-solid fa-file-code"></i>
                <span id="fileName"></span>
            </div>

            <button class="download-btn" id="downloadBtn">
                <i class="fa-solid fa-circle-down"></i> خذ الملف
            </button>

            <div class="footer">
                <i class="fa-solid fa-gem"></i> ByBokaArabic
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const downloadBtn = document.getElementById('downloadBtn');
        let selectedFileContent = null;

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            if (e.dataTransfer.files.length > 0) {
                processFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                processFile(e.target.files[0]);
            }
        });

        function processFile(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                selectedFileContent = event.target.result;
                fileName.textContent = file.name;
                fileInfo.style.display = 'flex';
                downloadBtn.style.display = 'block';
            };
            reader.readAsText(file);
        }

        downloadBtn.addEventListener('click', () => {
            if (!selectedFileContent) return;
            const blob = new Blob([selectedFileContent], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'index.html';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>

</body>
</html>
